name: my portofolio

on:
  push:
    branches: [ main ]

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v2
      
    - name: 🏗️ Setup Node and Build Assets
      run: |
        npm install
        npm run build
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ftp.zakkal.my.id
        username: myportofolio@zakkal.my.id
        password: myportofolio
        timeout: 1200000
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/bun.lock
          **/bun.lockb
          **/package-lock.json
          **/composer.lock
          tests/**
